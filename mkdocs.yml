site_name: Polygon Crusher 9000
site_description: Blender addon for fast, normal-preserving mesh decimation
site_author: Henri Lopes
site_url: https://henriquevlopes.github.io/polygon-crusher-9000-docs/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    scheme: default
    primary: blue grey
    accent: light blue
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.top
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tooltips

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
  - Settings Reference: settings.md
  - Troubleshooting: troubleshooting.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/solid/envelope
      link: mailto:henriquevlopes@gmail.com
      name: Contact Support
